<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<!-- 🔥 IMPORTANTE -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Sudoku</title>

<link rel="stylesheet" href="sudoku.css">

</head>

<body>

<a href="../../index.html" class="volver">⬅ Volver</a>

<h1>Sudoku 🧩</h1>

<div id="controls">

<div class="control-group">
<label>Tamaño</label>
<select id="size">
<option value="4">4x4</option>
<option value="9" selected>9x9</option>
</select>
</div>

<div class="control-group">
<label>Dificultad</label>
<select id="difficulty">
<option value="easy">Fácil</option>
<option value="medium">Medio</option>
<option value="hard">Difícil</option>
</select>
</div>

<button id="newGame" class="btn">Nuevo juego</button>
<button id="checkBtn" class="btn">Comprobar</button>

<button id="hintBtn" class="hint-btn">
💡 <span id="hintsLeft">3</span>
</button>

</div>

<div id="timer">⏱ 0:00</div>

<div id="sudokuBoard"></div>

<div id="mobilePad"></div>

<p id="message"></p>

<script src="sudoku.js"></script>

</body>
</html>
